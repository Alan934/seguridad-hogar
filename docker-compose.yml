services:
  frigate:
    container_name: frigate
    privileged: true 
    restart: unless-stopped
    image: ghcr.io/blakeblackshear/frigate:stable
    shm_size: "512mb"
    environment:
      - FRIGATE_RTSP_CAM1=${RTSP_CAM1}
      - FRIGATE_RTSP_CAM2=${RTSP_CAM2}
      - FRIGATE_RTSP_CAM3=${RTSP_CAM3}
      - FRIGATE_RTSP_CAM4=${RTSP_CAM4}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./config:/config
      - ./storage:/media/frigate
      - type: tmpfs 
        target: /tmp/cache
        tmpfs:
          size: 1000000000
    ports:
      - "5000:5000"     
      - "8554:8554"     
      - "8555:8555/tcp" 
      - "8555:8555/udp"
    networks:
      - seguridad_network
    depends_on:
      - mqtt

  mqtt:
    container_name: mqtt
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    networks:
      - seguridad_network

  homeassistant:
    container_name: homeassistant
    image: "ghcr.io/home-assistant/home-assistant:stable"
    volumes:
      - ./config_ha:/config
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "8123:8123" 
    restart: unless-stopped
    privileged: true
    networks:
      - seguridad_network
    depends_on:
      - mqtt

configs:
  frigate_config:
    file: ./config/config.yml

networks:
  seguridad_network:
    driver: bridge